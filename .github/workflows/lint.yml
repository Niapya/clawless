name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.0.1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Run check
        run: bun tsc --noEmit && bun biome check

      - name: Build application test
        run: bun next build